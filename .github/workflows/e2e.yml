name: E2E Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    services: {}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install frontend deps
        run: |
          cd my-tavus-app
          npm ci --legacy-peer-deps

      - name: Build frontend
        run: |
          cd my-tavus-app
          npm run build

      - name: Install Playwright browsers
        run: |
          cd my-tavus-app
          npx playwright install --with-deps

      - name: Start backend
        run: |
          nohup python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              echo "Backend is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Backend failed to become ready in time"
              exit 1
            fi
            sleep 1
          done

      - name: Start frontend preview
        run: |
          cd my-tavus-app
          nohup npx vite preview --port 5173 &
          for i in {1..45}; do
            if curl -fsS http://127.0.0.1:5173 >/dev/null || curl -fsS http://localhost:5173 >/dev/null; then
              echo "Frontend preview is ready"
              break
            fi
            if [ "$i" -eq 45 ]; then
              echo "Frontend preview failed to become ready in time"
              exit 1
            fi
            sleep 1
          done

      - name: Run Playwright tests
        run: |
          cd my-tavus-app
          npx playwright test --project=chromium --reporter=list
          npx playwright test e2e/mobile-call-controls.spec.ts --project=mobile-safari-ios --project=mobile-chrome-android --project=mobile-samsung-internet-android --reporter=list
          npx playwright test e2e/app-critical-flows.spec.ts --project=mobile-safari-ios --project=mobile-chrome-android --project=mobile-samsung-internet-android --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: my-tavus-app/playwright-report
